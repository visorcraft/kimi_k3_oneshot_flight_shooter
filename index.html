<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>X-Wing Skyfighter</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#000;color:#fff;font:14px system-ui,sans-serif}
  #app{position:fixed;inset:0;cursor:crosshair}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at center, transparent 60%, rgba(2,10,22,.42) 100%)}
  .panel{background:rgba(4,14,24,.55);border:1px solid rgba(120,200,255,.25);border-radius:6px;backdrop-filter:blur(2px)}
  /* hull */
  #hullBox{position:absolute;left:16px;top:16px;width:240px}
  .bar{position:relative;width:100%;height:14px;background:rgba(10,20,30,.7);border:1px solid rgba(255,255,255,.55);border-radius:3px;overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,#f33,#ff6);transition:width .12s ease-out}
  #hullBox.low .bar{animation:hullPulse .7s infinite}
  @keyframes hullPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,50,50,.0)}50%{box-shadow:0 0 14px 2px rgba(255,50,50,.9)}}
  #hpTxt{margin-top:4px;font-weight:700;text-shadow:0 0 4px #000;letter-spacing:1px}
  /* weapon / ammo */
  #weapon{position:absolute;left:16px;top:66px;font-weight:700;text-shadow:0 0 4px #000;background:rgba(4,14,24,.55);padding:4px 8px;border-radius:4px;border:1px solid rgba(120,200,255,.25)}
  #ammo{position:absolute;left:16px;top:96px;font-weight:700;text-shadow:0 0 4px #000}
  /* score */
  #score{position:absolute;right:16px;top:16px;font-weight:700;text-shadow:0 0 6px #000;font-size:20px;letter-spacing:1px}
  #best{position:absolute;right:16px;top:44px;font-weight:700;font-size:12px;text-shadow:0 0 3px #000;opacity:.7}
  /* message */
  #msg{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);font:700 42px system-ui,sans-serif;text-shadow:0 0 12px #000, 0 0 4px #fff;text-align:center;letter-spacing:2px;pointer-events:none}
  #msg small{display:block;font-size:18px;font-weight:400;opacity:.85;margin-top:10px;letter-spacing:1px}
  #damageFlash{position:fixed;inset:0;pointer-events:none;z-index:3;background:radial-gradient(ellipse at center, transparent 55%, rgba(255,40,40,.65) 100%);opacity:0;transition:opacity .15s ease-out}
  #nukeFlash{position:fixed;inset:0;pointer-events:none;z-index:4;background:radial-gradient(ellipse at center, rgba(255,250,230,.95) 0%, rgba(255,220,160,.75) 45%, rgba(255,180,90,.35) 100%);opacity:0}
  /* reticle + hit marker */
  #reticle{position:absolute;left:50%;top:50%;width:24px;height:24px;margin:-12px 0 0 -12px;border:2px solid #f44;border-radius:50%;transition:box-shadow .08s}
  #reticle::before,#reticle::after{content:"";position:absolute;background:#f44}
  #reticle::before{left:50%;top:-6px;width:2px;height:6px;margin-left:-1px}
  #reticle::after{left:50%;bottom:-6px;width:2px;height:6px;margin-left:-1px}
  #reticle.hit{border-color:#ffe070;box-shadow:0 0 10px 3px rgba(255,220,80,.9)}
  /* steering cursor (mouse-aim) */
  #stick{position:absolute;left:50%;top:50%;width:10px;height:10px;margin:-5px 0 0 -5px;border:1.5px solid #6cf;border-radius:50%;opacity:.85;box-shadow:0 0 6px rgba(102,204,255,.8)}
  /* flight data panel (bottom-left) */
  .ctrl{position:absolute;left:16px;bottom:16px;padding:8px 12px;font-size:12px;line-height:1.7;min-width:150px}
  .ctrl b{display:inline-block;width:36px;opacity:.65;font-weight:600}
  .ctrl span{font-weight:700;font-variant-numeric:tabular-nums}
  .tbar{margin-top:4px;height:6px;background:rgba(10,25,35,.8);border:1px solid rgba(120,200,255,.35);border-radius:3px;overflow:hidden}
  .tbar>i{display:block;height:100%;background:linear-gradient(90deg,#1a6f9f,#6cf);transition:width .1s linear}
  /* radar */
  #radar{position:absolute;right:16px;bottom:16px;border-radius:50%;box-shadow:0 0 0 1px rgba(120,200,255,.35),0 0 18px rgba(0,0,0,.5)}
  /* help */
  #help{position:absolute;left:50%;bottom:12px;transform:translateX(-50%);background:rgba(4,14,24,.5);padding:5px 12px;border-radius:5px;font-size:11.5px;line-height:1.5;opacity:.8;white-space:nowrap;border:1px solid rgba(120,200,255,.18)}
  #lock{position:absolute;pointer-events:none;border:2px solid #fff;box-shadow:0 0 8px rgba(255,255,255,.5)}
</style>
</head>
<body>
<div id="app"></div>
<div id="vignette"></div>
<div id="damageFlash"></div>
<div id="nukeFlash"></div>
<div id="hud">
  <div id="hullBox"><div class="bar"><i id="hp"></i></div><div id="hpTxt">HULL 100</div></div>
  <div id="weapon">LASER</div>
  <div id="ammo">LASER ∞ | MISSILE 10</div>
  <div id="score">SCORE 0</div>
  <div id="best">BEST 0</div>
  <div id="reticle"></div>
  <div id="stick"></div>
  <div id="msg"></div>
  <div id="lock"></div>
  <div class="ctrl panel">
    <div><b>SPD</b> <span id="spd">0</span> u/s</div>
    <div><b>ALT</b> <span id="alt">0</span> u</div>
    <div><b>THR</b></div>
    <div class="tbar"><i id="thr"></i></div>
  </div>
  <canvas id="radar" width="160" height="160"></canvas>
  <div id="help">Click to capture mouse — Mouse: steer • A/D: roll (dbl-tap: barrel roll) • W/S: throttle • Space: boost • Shift: brake • L-click: laser • M: missile • R-click/N: missile • I: invert Y • U: sound • P: pause</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ---------------- Bootstrap ----------------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
// software GL stacks (SwiftShader/llvmpipe) run with 1x pixels and no bloom (below) —
// it keeps them away from the memory pressure that kills their GL context
const glDebugInfo = renderer.getContext().getExtension('WEBGL_debug_renderer_info');
const glRendererName = glDebugInfo ? String(renderer.getContext().getParameter(glDebugInfo.UNMASKED_RENDERER_WEBGL)) : '';
const softwareGL = /swiftshader|llvmpipe|software/i.test(glRendererName);
renderer.setPixelRatio(softwareGL ? 1 : Math.min(window.devicePixelRatio, 1.6));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = false;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const HORIZON_COL = 0xa9c6e6;
scene.fog = new THREE.FogExp2(HORIZON_COL, 0.0008);
scene.background = new THREE.Color(HORIZON_COL);

const BASE_FOV = 75;
const camera = new THREE.PerspectiveCamera(BASE_FOV, innerWidth / innerHeight, 0.5, 5000);
camera.position.set(0, 60, 120);
camera.lookAt(0, 55, 0);

// Post-processing: bloom makes lasers/engines/explosions/sun glow.
// Skipped on software GL stacks — plain rendering is fully playable without it.
let composer = null;
if (!softwareGL) {
  try {
    composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.55, 0.35, 0.85);
    composer.addPass(bloom);
    composer.addPass(new OutputPass());
  } catch (e) { composer = null; }
}

// If the GL context ever dies (driver reset, memory pressure): three.js restores it
// in place on 'webglcontextrestored' (programs/buffers re-upload on next render), so the
// game continues without losing state. Page reload is only a fallback if restore never
// comes — and never under automation, where a reload would wipe test state.
let glRecoverT = null;
renderer.domElement.addEventListener('webglcontextlost', e => {
  e.preventDefault();
  setMsg('GRAPHICS GLITCH\nrecovering…', 8);
  if (!navigator.webdriver) {
    clearTimeout(glRecoverT);
    glRecoverT = setTimeout(() => location.reload(), 5000);
  }
});
renderer.domElement.addEventListener('webglcontextrestored', () => {
  clearTimeout(glRecoverT);
  msgUntil = 0; // clear the recovering message next frame
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  if (composer) composer.setSize(innerWidth, innerHeight);
});

// ---------------- Lights ----------------
const hemi = new THREE.HemisphereLight(0xfff2dd, 0x466aab, 0.5);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff0d4, 1.2);
sun.position.set(500, 800, 300);
scene.add(sun);

// ---------------- Sprite texture helpers (canvas-generated, no assets) ----------------
function makeGlowTexture(size = 128, inner = 'rgba(255,255,255,1)', mid = 'rgba(255,220,160,0.55)', outer = 'rgba(255,200,120,0)') {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  // smooth multi-stop falloff — hard stop plateaus band into visible rings when scaled large
  const grad = g.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, inner);
  grad.addColorStop(0.15, inner);
  grad.addColorStop(0.38, mid);
  grad.addColorStop(0.65, outer);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
// fireball texture: fat opaque core so explosions read at distance, fiery falloff at the edge
function makeFireTexture(size = 128) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
  grad.addColorStop(0, 'rgba(255,255,235,1)');
  grad.addColorStop(0.25, 'rgba(255,240,200,1)');
  grad.addColorStop(0.45, 'rgba(255,170,60,0.9)');
  grad.addColorStop(0.65, 'rgba(255,90,30,0.55)');
  grad.addColorStop(0.85, 'rgba(200,40,20,0.15)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = grad;
  g.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const glowTex = makeGlowTexture();
const cloudTex = makeGlowTexture(128, 'rgba(255,255,255,0.95)', 'rgba(245,250,255,0.5)', 'rgba(240,248,255,0)');
const fireTex = makeFireTexture();

// ---------------- Sky ----------------
const skyGeo = new THREE.SphereGeometry(3000, 32, 16);
const skyMat = new THREE.ShaderMaterial({
  side: THREE.BackSide,
  uniforms: {
    topCol: { value: new THREE.Color(0x2e6cc4) },
    midCol: { value: new THREE.Color(0x8fb9e4) },
    botCol: { value: new THREE.Color(0xdfe9f2) },
    sunDir: { value: new THREE.Vector3(1500, 1200, -800).normalize() },
    sunCol: { value: new THREE.Color(0xffe0b0) }
  },
  vertexShader: `varying vec3 vPos; void main(){ vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
  fragmentShader: `
    varying vec3 vPos;
    uniform vec3 topCol; uniform vec3 midCol; uniform vec3 botCol; uniform vec3 sunDir; uniform vec3 sunCol;
    void main(){
      vec3 d = normalize(vPos);
      float h = clamp(d.y, -0.05, 1.0);
      // horizon -> mid -> zenith gradient
      vec3 col = mix(botCol, midCol, smoothstep(0.0, 0.22, h));
      col = mix(col, topCol, smoothstep(0.18, 0.75, h));
      // warm haze around the sun
      float s = max(dot(d, sunDir), 0.0);
      col += sunCol * (pow(s, 24.0) * 0.55 + pow(s, 4.0) * 0.12);
      gl_FragColor = vec4(col, 1.0);
    }`
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// ---------------- Sun disc + glow ----------------
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(60, 24, 24),
  new THREE.MeshBasicMaterial({ color: 0xfff2c8 })
);
sunMesh.position.set(1500, 1200, -800);
scene.add(sunMesh);
const sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xffe6b0, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending, depthWrite: false }));
sunGlow.scale.set(520, 520, 1);
sunGlow.position.copy(sunMesh.position);
scene.add(sunGlow);

// ---------------- World: terrain + water ----------------
function makeNoise(seed = 1337) {
  // value-noise 2D; deterministic by seed
  const perm = new Uint8Array(512);
  let s = seed >>> 0;
  for (let i = 0; i < 256; i++) { s = (s * 1664525 + 1013904223) >>> 0; perm[i] = i; }
  for (let i = 255; i > 0; i--) { s = (s * 1664525 + 1013904223) >>> 0; const j = s % (i + 1); const t = perm[i]; perm[i] = perm[j]; perm[j] = t; }
  for (let i = 0; i < 256; i++) perm[i + 256] = perm[i];
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + (b - a) * t;
  const grad = (h, x, y) => ((h & 1) ? -x : x) + ((h & 2) ? -y : y);
  return (x, y) => {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = fade(x), v = fade(y);
    const A = perm[X] + Y, B = perm[X + 1] + Y;
    return lerp(
      lerp(grad(perm[A], x, y), grad(perm[B], x - 1, y), u),
      lerp(grad(perm[A + 1], x, y - 1), grad(perm[B + 1], x - 1, y - 1), u),
      v
    );
  };
}
const noise = makeNoise(2026);
const fbm = (x, z) => {
  let v = 0, amp = 1, freq = 1;
  for (let i = 0; i < 5; i++) { v += noise(x * freq, z * freq) * amp; amp *= 0.5; freq *= 2; }
  return v;
};
const heightAt = (x, z) => {
  // gentle rolling terrain — low amplitude so the world reads as varied ground, not a mountain range
  const base = fbm(x * 0.0018, z * 0.0018) * 32;
  const ridges = Math.abs(fbm(x * 0.006, z * 0.006)) * 12;
  return -2 + base + ridges;
};

const WORLD_R = 5000;
// terrain far larger than world so edges live in fog and the world looks seamless via toroidal wrap
const TERRAIN_R = WORLD_R * 3;
const SEG = 160; // segments per axis
const SIZE = TERRAIN_R * 2;
const terrainGeo = new THREE.PlaneGeometry(SIZE, SIZE, SEG, SEG);
terrainGeo.rotateX(-Math.PI / 2);
{
  const pos = terrainGeo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const cSand = new THREE.Color(0xcbb887), cGrassL = new THREE.Color(0x3f7a34), cGrassH = new THREE.Color(0x6a9a48),
        cRock = new THREE.Color(0x7a7268), cSnow = new THREE.Color(0xe8edf2);
  const col = new THREE.Color();
  for (let i = 0; i < pos.count; i++) {
    const x = pos.getX(i), z = pos.getZ(i);
    const h = heightAt(x, z);
    pos.setY(i, h);
    // slope estimate by finite difference
    const e = 6;
    const slope = Math.abs(heightAt(x + e, z) - heightAt(x - e, z)) / (2 * e) + Math.abs(heightAt(x, z + e) - heightAt(x, z - e)) / (2 * e);
    const jitter = noise(x * 0.05, z * 0.05) * 4;
    const hh = h + jitter;
    if (hh < 3.5) col.copy(cSand);
    else if (hh < 34) col.copy(cGrassL).lerp(cGrassH, (hh - 3.5) / 30.5);
    else if (hh < 68) col.copy(cGrassH).lerp(cRock, (hh - 34) / 34);
    else col.copy(cRock).lerp(cSnow, Math.min(1, (hh - 68) / 22));
    // steep slopes become rock regardless of height
    if (slope > 0.9 && hh > 4) col.lerp(cRock, Math.min(1, (slope - 0.9) * 1.6));
    colors[i * 3] = col.r; colors[i * 3 + 1] = col.g; colors[i * 3 + 2] = col.b;
  }
  terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  terrainGeo.computeVertexNormals();
}
const terrainMat = new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.95, metalness: 0.0, flatShading: true
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.position.y = 0;
scene.add(terrain);

// Water — large plane with subtle waves via shader
const waterGeo = new THREE.PlaneGeometry(SIZE * 1.2, SIZE * 1.2, 1, 1);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: { time: { value: 0 }, sunDir: { value: new THREE.Vector3(0.5, 0.7, -0.5).normalize() } },
  vertexShader: `varying vec3 vWPos; void main(){ vec4 wp = modelMatrix * vec4(position,1.0); vWPos = wp.xyz; gl_Position = projectionMatrix * viewMatrix * wp; }`,
  fragmentShader: `
    uniform float time; varying vec3 vWPos; uniform vec3 sunDir;
    float w(vec2 p){ return sin(p.x*0.02+time*0.6)*cos(p.y*0.03+time*0.4)*0.5 + sin(p.x*0.08+time*1.4)*0.2; }
    void main(){
      vec2 p = vWPos.xz;
      float a = w(p), b = w(p+vec2(2.0,0.0)), c = w(p+vec2(0.0,2.0));
      vec3 n = normalize(vec3((b-a)*0.6, 1.0, (c-a)*0.6));
      vec3 col = mix(vec3(0.04,0.14,0.28), vec3(0.13,0.38,0.53), clamp(dot(n, vec3(0,1,0)),0.0,1.0));
      float spec = pow(max(dot(reflect(-sunDir,n), vec3(0,1,0)),0.0), 32.0);
      col += vec3(1.0,0.9,0.7) * spec * 0.5;
      gl_FragColor = vec4(col, 0.88);
    }`
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.y = -2;
scene.add(water);

// ---------------- Trees + Mountains (instanced) ----------------
const treeBaseGeo = new THREE.ConeGeometry(2.4, 9, 6);
treeBaseGeo.translate(0, 4.5, 0);
const treeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 });
const trunkGeo = new THREE.CylinderGeometry(0.35, 0.5, 2, 6);
trunkGeo.translate(0, 1, 0);
const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4b3a25, roughness: 1 });

const TREE_BATCH = 600;
const trees = new THREE.InstancedMesh(treeBaseGeo, treeMat, TREE_BATCH);
const treeMatrices = [];
const trunkMesh = new THREE.InstancedMesh(trunkGeo, trunkMat, TREE_BATCH);
const dummy = new THREE.Object3D();
const treeCol = new THREE.Color();
let treeIdx = 0;
const treeSeenRing = new Set();
// dense-tree slots so the world looks lush without perf cost; far rings cull by zero-scale
function ensureTreesAround(cx, cz, radius = 1500) {
  const target = 600;
  if (treeIdx >= target) return;
  let added = 0;
  for (let attempt = 0; attempt < 1200 && treeIdx < target; attempt++) {
    const ang = Math.random() * Math.PI * 2;
    const r = 80 + Math.random() * (radius - 80);
    const x = Math.round((cx + Math.cos(ang) * r) / 6) * 6;
    const z = Math.round((cz + Math.sin(ang) * r) / 6) * 6;
    const key = `${x},${z}`;
    if (treeSeenRing.has(key)) continue;
    treeSeenRing.add(key);
    const h = heightAt(x, z);
    if (h < 3 || h > 60) continue;
    dummy.position.set(x, h, z);
    const s = 0.7 + Math.random() * 1.6;
    dummy.scale.set(s, s + Math.random() * 1.2, s);
    dummy.rotation.y = Math.random() * Math.PI * 2;
    dummy.updateMatrix();
    trees.setMatrixAt(treeIdx, dummy.matrix);
    // per-instance hue jitter so the forest doesn't look stamped
    treeCol.setHSL(0.33 + Math.random() * 0.06, 0.5 + Math.random() * 0.2, 0.22 + Math.random() * 0.1);
    trees.setColorAt(treeIdx, treeCol);
    treeMatrices.push({ x, y: h, z, s: dummy.scale.x });
    trunkMesh.setMatrixAt(treeIdx, dummy.matrix);
    treeIdx++; added++;
  }
  if (added) {
    trees.instanceMatrix.needsUpdate = true;
    trunkMesh.instanceMatrix.needsUpdate = true;
    if (trees.instanceColor) trees.instanceColor.needsUpdate = true;
    trees.count = treeIdx;
    trunkMesh.count = treeIdx;
  }
}
trees.count = 0; trunkMesh.count = 0;
scene.add(trees); scene.add(trunkMesh);

// Mountains — big rock piles
function makeMountain(x, z) {
  const g = new THREE.IcosahedronGeometry(40 + Math.random() * 80, 1);
  const pos = g.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const v = new THREE.Vector3().fromBufferAttribute(pos, i);
    const n = fbm(v.x * 0.04 + x, v.z * 0.04 + z);
    v.multiplyScalar(0.85 + n * 0.25);
    pos.setXYZ(i, v.x, v.y, v.z);
  }
  g.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color().setHSL(0.08, 0.08, 0.42 + Math.random() * 0.14), flatShading: true, roughness: 0.95 });
  const m = new THREE.Mesh(g, mat);
  const h = heightAt(x, z);
  m.position.set(x, h + 10, z);
  return m;
}
const mountains = new THREE.Group();
const seenM = new Set();
function ensureMountainsAround(cx, cz, radius = 3000) {
  let added = 0;
  // few mountain clusters — more reads as clutter
  for (let attempt = 0; attempt < 6; attempt++) {
    const ang = Math.random() * Math.PI * 2;
    const r = 800 + Math.random() * (radius - 800);
    const [xRaw, zRaw] = wrapXZ(cx + Math.cos(ang) * r, cz + Math.sin(ang) * r);
    const x = Math.round(xRaw / 50) * 50;
    const z = Math.round(zRaw / 50) * 50;
    const key = `m${x},${z}`;
    if (seenM.has(key)) continue;
    seenM.add(key);
    const h = heightAt(x, z);
    if (h < 8) continue;

// ribbon strip per engine: ring buffer of world points, rebuilt each frame
function makeTrail(hex, n = 42) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(n * 2 * 3);
  const alphas = new Float32Array(n * 2);
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));
  const idx = [];
  for (let i = 0; i < n - 1; i++) {
    const a = i * 2, b = i * 2 + 1, c = i * 2 + 2, d = i * 2 + 3;
    idx.push(a, b, c, b, d, c);
  }
  geo.setIndex(idx);
  const mat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    uniforms: { color: { value: new THREE.Color(hex) } },
    vertexShader: `attribute float alpha; varying float vA; void main(){ vA = alpha; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }`,
    fragmentShader: `uniform vec3 color; varying float vA; void main(){ gl_FragColor = vec4(color, vA); }`
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.frustumCulled = false;
  scene.add(mesh);
  return { mesh, geo, pts: [], n, strength: 0 };
}
const trailL = makeTrail(0xbfe0ff);
const trailR = makeTrail(0xbfe0ff);
const _tv1 = new THREE.Vector3(), _tv2 = new THREE.Vector3(), _tv3 = new THREE.Vector3();
function updateTrail(tr, tipWorld, dt, strength) {
  tr.strength = strength;
  const pts = tr.pts;
  pts.unshift(tipWorld.clone());
  if (pts.length > tr.n) pts.pop();
  while (pts.length < tr.n) pts.push(tipWorld.clone());
  const pos = tr.geo.attributes.position.array;
  const alp = tr.geo.attributes.alpha.array;
  const camPos = camera.position;
  for (let i = 0; i < tr.n; i++) {
    const p = pts[i];
    const pNext = pts[Math.min(i + 1, tr.n - 1)];
    // ribbon width direction: perpendicular to segment and view
    _tv1.subVectors(pNext, p);
    _tv2.subVectors(p, camPos);
    _tv3.crossVectors(_tv1, _tv2).normalize();
    const w = (0.3 * (1 - i / tr.n) + 0.04) * 2.2;
    const fade = Math.pow(1 - i / tr.n, 2.2) * 0.18 * strength;
    pos[i * 6] = p.x + _tv3.x * w; pos[i * 6 + 1] = p.y + _tv3.y * w; pos[i * 6 + 2] = p.z + _tv3.z * w;
    pos[i * 6 + 3] = p.x - _tv3.x * w; pos[i * 6 + 4] = p.y - _tv3.y * w; pos[i * 6 + 5] = p.z - _tv3.z * w;
    alp[i * 2] = fade; alp[i * 2 + 1] = fade;
  }
  tr.geo.attributes.position.needsUpdate = true;
  tr.geo.attributes.alpha.needsUpdate = true;
}
function clearTrails() { trailL.pts.length = 0; trailR.pts.length = 0; }

function buildUFO(seed = 0) {

  dome.position.y = 1.0;

  }

  g.userData.seed = seed;
  g.userData.altType = seed % 5;
  if (g.userData.altType === 1) {
    const fins = new THREE.Group();
    for (let i = 0; i < 6; i++) {
      const f = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.2, 1.4), new THREE.MeshStandardMaterial({ color: 0x555 }));
      f.position.set(Math.cos(i / 6 * Math.PI * 2) * 2.6, 0, Math.sin(i / 6 * Math.PI * 2) * 2.6);
      f.lookAt(0, 0, 0);
      fins.add(f);
    }

  } else if (g.userData.altType === 2) {
    const big = new THREE.Mesh(new THREE.SphereGeometry(3.5, 16, 12), new THREE.MeshStandardMaterial({ color: 0x303040, metalness: 0.7, roughness: 0.3 }));
    big.scale.y = 0.6;

    body2.rotation.x = -Math.PI / 2;
    g.add(body2);
  } else if (g.userData.altType === 4) {
    // spiked
    for (let i = 0; i < 12; i++) {
      const sp = new THREE.Mesh(new THREE.ConeGeometry(0.4, 1.6, 6), new THREE.MeshStandardMaterial({ color: 0x800 }));
      sp.position.set(Math.cos(i / 12 * Math.PI * 2) * 3.0, 0, Math.sin(i / 12 * Math.PI * 2) * 3.0);
      sp.lookAt(sp.position.x * 2, 0, sp.position.z * 2);
      g.add(sp);
    }
  }
  return g;
}

function wrapXZ(x, z) {
  const w = WORLD_R * 2;
  let wx = ((x + WORLD_R) % w + w) % w - WORLD_R;

}
function wrapPos(p) {

}

    if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume().catch(() => {}); return; }
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = this.muted ? 0 : 0.8;
      this.master.connect(this.ctx.destination);
      // engine: two detuned oscillators through a lowpass, gain/pitch follow flight
      this.engineFilter = this.ctx.createBiquadFilter();
      this.engineFilter.type = 'lowpass';
      this.engineFilter.frequency.value = 320;
      this.engineGain = this.ctx.createGain();
      this.engineGain.gain.value = 0;
      this.engineOsc = this.ctx.createOscillator();
      this.engineOsc.type = 'sawtooth';
      this.engineOsc.frequency.value = 60;
      this.engineOsc2 = this.ctx.createOscillator();
      this.engineOsc2.type = 'square';
      this.engineOsc2.frequency.value = 90.5;
      const eg2 = this.ctx.createGain(); eg2.gain.value = 0.4;
      this.engineOsc.connect(this.engineFilter);
      this.engineOsc2.connect(eg2); eg2.connect(this.engineFilter);
      this.engineFilter.connect(this.engineGain);
      this.engineGain.connect(this.master);
      this.engineOsc.start(); this.engineOsc2.start();
      // shared noise buffer for explosions/hits
      const len = this.ctx.sampleRate;
      this.noiseBuf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
      const d = this.noiseBuf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    } catch (e) { this.ctx = null; }
  },
  toggleMute() {
    this.muted = !this.muted;
    if (this.master) this.master.gain.setTargetAtTime(this.muted ? 0 : 0.8, this.ctx.currentTime, 0.05);
  },
  laser() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(160, t + 0.14);
    g.gain.setValueAtTime(0.11, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + 0.15);
  },
  explosion(big = false) {
    if (!this.ctx || !this.noiseBuf) return;
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf;
    src.playbackRate.value = big ? 0.5 : 0.9;
    const f = this.ctx.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(big ? 900 : 1400, t);
    f.frequency.exponentialRampToValueAtTime(80, t + (big ? 0.9 : 0.45));
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(big ? 0.55 : 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + (big ? 0.95 : 0.5));
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t); src.stop(t + (big ? 1.0 : 0.55));
  },
  pickup() {
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    for (const [i, fq] of [660, 990].entries()) {
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.type = 'sine'; o.frequency.value = fq;
      g.gain.setValueAtTime(0.0001, t + i * 0.07);
      g.gain.exponentialRampToValueAtTime(0.14, t + i * 0.07 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.16);
      o.connect(g); g.connect(this.master);
      o.start(t + i * 0.07); o.stop(t + i * 0.07 + 0.18);
    }
  },
  damage() {
    if (!this.ctx || !this.noiseBuf) return;
    const t = this.ctx.currentTime;
    const src = this.ctx.createBufferSource();
    src.buffer = this.noiseBuf;
    const f = this.ctx.createBiquadFilter();
    f.type = 'lowpass'; f.frequency.value = 280;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.32, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t); src.stop(t + 0.25);
  },
  // call every frame with flight state
  engineUpdate(dt, active) {
    if (!this.ctx || !this.engineGain) return;
    const t = this.ctx.currentTime;
    const thr = active ? state.throttle : 0;
    const target = active ? 0.025 + thr * 0.055 + (keys.has('Space') ? 0.03 : 0) : 0;
    this.engineGain.gain.setTargetAtTime(target, t, 0.12);
    const fq = 55 + thr * 75 + state.speedMult * 12;
    this.engineOsc.frequency.setTargetAtTime(fq, t, 0.15);
    this.engineOsc2.frequency.setTargetAtTime(fq * 1.5 + 0.7, t, 0.15);
  }
};

let bestScore = 0;
try { bestScore = parseInt(localStorage.getItem('xwing_skyfighter_best') || '0', 10) || 0; } catch (e) { /* localStorage may be unavailable */ }
$best.textContent = `BEST ${bestScore}`;
let msgUntil = 0;
function setMsg(text, dur = 2) {
  // allow "<line1>\n<line2>" via innerHTML for styled caption
  if (text.includes('\n')) {
    const [big, small] = text.split('\n');
    $msg.innerHTML = `${escapeHtml(big)}<small>${escapeHtml(small)}</small>`;
  } else {
    $msg.textContent = text;
  }
  msgUntil = performance.now() + dur * 1000;
}
function escapeHtml(s) { return s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// hit marker on the reticle when a shot connects
function markHit() {
  state.hitT = 0.14;
  $reticle.classList.add('hit');
}

// ---------------- Helpers ----------------
function shoot(type) {
  if (state.over || !state.alive || state.paused) return;
  if (type === 'laser') {
    if (state.fireT > 0) return; // respect fire rate — upgrades meaningfully raise it
    state.fireT = state.fireRate;
    fireLasers();
    state.muzzleT = 0.08; // brief muzzle flash
    audio.laser();
  } else if (type === 'missile') {
    if (state.missileAmmo <= 0) return;
    if (state.missileT > 0) return;
    state.missileAmmo--;
    state.missileT = 0.55;
    fireMissile();
  } else if (type === 'nuke') {
    // heavy AOE warhead — proximity-detonates near any enemy
    if (state.nukeT > 0) return;
    state.nukeT = 1.5;
    fireNuke();
    setMsg('MISSILE OUT', 1.2);
  }
}

function fireLasers() {
  // base: two red lasers (X-wing style), modulated by tier
  spawnBullet(0, -0.4, -7, 0, 0, -560, true);
  spawnBullet(0, 0.4, -7, 0, 0, -560, true);
  if (state.weapon === 'double') {
    spawnBullet(0, -0.6, -7, -30, 0, -560, true);
    spawnBullet(0, 0.6, -7, 30, 0, -560, true);
  } else if (state.weapon === 'plasma') {
    spawnBullet(0, 0, -7, 0, 0, -700, true, true);
  }
}

function fireMissile() {
  const target = pickMissileTarget();
  spawnMissile(0, -0.4, -5, true, target);
  spawnMissile(0, 0.4, -5, true, target);
}

function pickMissileTarget() {
  let best = null, bestDist = 800; // cap range, wrap-near enemies allowed
  for (const e of enemies) {
    let dx = e.group.position.x - state.pos.x, dz = e.group.position.z - state.pos.z;
    if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
    if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
    const d = Math.sqrt(dx * dx + dz * dz);
    if (d < bestDist) { bestDist = d; best = e.group; }
  }
  return best;
}

function spawnBullet(x, y, z, vx, vy, vz, friendly, plasma = false) {
  const m = new THREE.Mesh(plasma ? plasmaGeo : laserGeo, plasma ? plasmaMat : laserMat);
  // attach to ship's local frame
  ship.localToWorld(tmpVec.set(x, y, z));
  m.position.copy(tmpVec);
  // velocity vector is given in ship-local space (-Z = nose); rotate to world, inherit ship velocity
  tmpVec2.set(vx, vy, vz).applyQuaternion(state.quat).add(state.vel);
  // orient the bolt along its flight path
  m.lookAt(tmpVec.x + tmpVec2.x, tmpVec.y + tmpVec2.y, tmpVec.z + tmpVec2.z);
  bullets.push({ mesh: m, vx: tmpVec2.x, vy: tmpVec2.y, vz: tmpVec2.z, friendly, life: 1.6, plasma });
  scene.add(m);
}

function fireNuke() {
  spawnNuke();
}

function spawnNuke() {
  const g = new THREE.Group();
  // body — orange/red warhead with bright tip
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.45, 0.45, 2.8, 12),
    new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff6622, emissiveIntensity: 0.9, metalness: 0.6 })
  );
  body.rotation.x = Math.PI / 2;
  g.add(body);
  const tip = new THREE.Mesh(
    new THREE.ConeGeometry(0.45, 1.2, 12),
    new THREE.MeshStandardMaterial({ color: 0xff3322, emissive: 0xff3322, emissiveIntensity: 1.0 })
  );
  tip.rotation.x = -Math.PI / 2;
  tip.position.z = -2.0;
  g.add(tip);
  // fire trail
  const flame = new THREE.Mesh(
    new THREE.ConeGeometry(0.45, 1.6, 10),
    new THREE.MeshBasicMaterial({ color: 0xffd070, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  flame.rotation.x = Math.PI / 2;
  flame.position.z = 1.6;
  g.add(flame);
  // bright glow so the warhead is easy to track in flight
  const nukeGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: glowTex, color: 0xffa050, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false }));
  nukeGlow.scale.set(9, 9, 1);
  g.add(nukeGlow);
  // emit a small point light so the warhead glows on the world
  g.add(new THREE.PointLight(0xff7733, 2.5, 30));
  // position at ship nose
  ship.localToWorld(tmpVec.set(0, 0, -8));
  g.position.copy(tmpVec);
  // aim ship-forward (X-Wing faces -Z; getWorldDirection returns +Z, so negate)
  ship.getWorldDirection(_fwd).negate();
  // model tip sits at -Z and flame at +Z: orient +Z tail-ward so the nose leads the flight path
  g.lookAt(tmpVec2.copy(tmpVec).sub(_fwd));
  const speed = 360;
  nukes.push({ group: g, vx: _fwd.x * speed, vy: _fwd.y * speed, vz: _fwd.z * speed, life: 5, flame });
  scene.add(g);
}

function spawnMissile(x, y, z, friendly, target) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 1.2, 6), new THREE.MeshStandardMaterial({ color: 0xddddee, metalness: 0.5 }));
  body.rotation.x = Math.PI / 2;
  g.add(body);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.4, 6), new THREE.MeshStandardMaterial({ color: 0xff2244, emissive: 0xff2244, emissiveIntensity: 0.8 }));
  tip.rotation.x = -Math.PI / 2;
  tip.position.z = -0.7;
  g.add(tip);
  const flame = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.7, 6), new THREE.MeshBasicMaterial({ color: 0xffd070, transparent: true, opacity: 0.95, blending: THREE.AdditiveBlending, depthWrite: false }));
  flame.rotation.x = Math.PI / 2;
  flame.position.z = 0.7;
  g.add(flame);
  ship.localToWorld(tmpVec.set(x, y, z));
  g.position.copy(tmpVec);
  // launch along the nose (X-Wing faces -Z; getWorldDirection returns +Z, so negate)
  ship.getWorldDirection(_fwd).negate();
  // model tip sits at -Z and flame at +Z: orient +Z tail-ward so the nose leads the flight path
  g.lookAt(tmpVec2.copy(tmpVec).sub(_fwd));
  missiles.push({ group: g, vx: _fwd.x * 220, vy: _fwd.y * 220, vz: _fwd.z * 220, friendly, target, life: 4, flame });
  scene.add(g);
}

function spawnExplosion(pos, scale = 1, opts = {}) {
  const life = opts.life ?? 0.8;
  const g = new THREE.Group();
  const nDebris = opts.debris ?? 8;
  const debrisSpd = opts.debrisSpd ?? 8;
  for (let i = 0; i < nDebris; i++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.6 * scale, 6, 6), new THREE.MeshBasicMaterial({ color: i % 2 ? 0xffd060 : 0xff4040, transparent: true, opacity: 1 }));
    p.position.set((Math.random() - 0.5) * 2 * scale, (Math.random() - 0.5) * 2 * scale, (Math.random() - 0.5) * 2 * scale);
    p.userData.vel = new THREE.Vector3((Math.random() - 0.5) * debrisSpd * scale, Math.random() * debrisSpd * scale, (Math.random() - 0.5) * debrisSpd * scale);
    g.add(p);
  }
  // fireball sprite (grows + fades) — normal blending so it stays visible against the
  // bright sky (additive washes out to nothing over near-white backgrounds)
  const fireball = new THREE.Sprite(new THREE.SpriteMaterial({ map: fireTex, color: 0xffffff, transparent: true, opacity: 0.95, depthWrite: false }));
  fireball.scale.set(2, 2, 1);
  g.add(fireball);
  // smoke cap — lingers after the fireball dies (nuke blasts only)
  let smoke = null;
  if (opts.smoke) {
    smoke = new THREE.Sprite(new THREE.SpriteMaterial({ map: fireTex, color: 0x4a4038, transparent: true, opacity: 0.55, depthWrite: false }));
    smoke.scale.set(4, 4, 1);
    g.add(smoke);
  }
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.8, 1.0, 32),
    new THREE.MeshBasicMaterial({ color: 0xffcf90, transparent: true, opacity: 0.7, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  g.add(ring);
  // brief light flash so the blast lights up the world (nuke blasts only)
  let light = null;
  if (opts.light) {
    light = new THREE.PointLight(0xffb070, 6, 600, 1.2);
    g.add(light);
  }
  g.position.copy(pos);
  scene.add(g);
  explosions.push({
    group: g, life, maxLife: life, scale, fireball, smoke, ring, light,
    fbGrow: opts.fbGrow ?? 10, ringGrow: opts.ringGrow ?? 26
  });
  if (scale >= 0.6) audio.explosion(scale >= 2); // small laser-impact puffs stay silent
}

function damagePlayer(amount) {
  if (state.invuln > 0 || state.shieldT > 0) return; // shield absorbs hits
  state.hp -= amount;
  state.dmgFlash = 1.0;
  state.shake = Math.min(1.5, (state.shake || 0) + amount * 0.02); // shake intensity scales with hit
  audio.damage();
  if (state.hp <= 0) {
    state.hp = 0;
    state.alive = false;
    state.over = true; // gate R/Enter restart on this flag
    spawnExplosion(ship.position, 2);
    setMsg('EJECTED\nPress R or Enter to redeploy', 999);
    if (document.pointerLockElement) document.exitPointerLock();
  }
  state.invuln = 0.5;
}

function applyPowerUp(kind) {
  audio.pickup();
  if (kind === 'hp') {
    if (state.hp >= state.maxHp) setMsg('HULL FULL');
    else { state.hp = Math.min(state.maxHp, state.hp + 30); setMsg('+HEALTH'); }
  }
  else if (kind === 'laser') {
    state.laserTier = Math.min(4, state.laserTier + 1);
    state.weapon = state.laserTier >= 4 ? 'plasma' : state.laserTier >= 3 ? 'double' : state.laserTier >= 2 ? 'rapid' : 'laser';
    if (state.laserTier === 2) state.fireRate = 0.12;
    if (state.laserTier >= 3) state.fireRate = 0.1;
    setMsg('LASER TIER ' + state.laserTier);
  }
  else if (kind === 'rapid') { state.weapon = 'rapid'; state.fireRate = 0.08; state.rapidT = 12; setMsg('RAPID FIRE'); }
  else if (kind === 'double') { state.weapon = 'double'; state.doubleT = 12; setMsg('DOUBLE LASER'); }
  else if (kind === 'plasma') { state.weapon = 'plasma'; state.plasmaT = 10; setMsg('PLASMA LASER'); }
  else if (kind === 'missile') {
    if (state.missileAmmo >= state.missileMax) setMsg('AMMO FULL');
    else { state.missileAmmo = Math.min(state.missileMax, state.missileAmmo + 5); state.missileTimerT = 0; setMsg('+5 MISSILES'); }
  }
  else if (kind === 'shield') { state.shieldT = 8; setMsg('SHIELDS UP'); }
}

function restart() {
  // persist best score across sessions
  if (state.score > bestScore) { bestScore = state.score; try { localStorage.setItem('xwing_skyfighter_best', String(bestScore)); } catch(e){} $best.textContent = `BEST ${bestScore}`; }
  state.hp = 100; state.maxHp = 100;
  state.weapon = 'laser'; state.laserTier = 1; state.fireRate = 0.22;
  state.missileAmmo = 10; state.score = 0;
  state.pos.set(0, 60, 0); state.vel.set(0, 0, 0);
  // reset orientation/throttle too — otherwise stale attitude persists across deaths
  state.quat.identity();
  state.throttle = 0.55;
  state.shieldT = 0; state.rapidT = 0; state.plasmaT = 0; state.doubleT = 0; state.missileTimerT = 0;
  state.invuln = 1.0; // brief i-frames on respawn so we don't insta-die on crowded restart
  state.alive = true; state.over = false; state.paused = false;
  state.dmgFlash = 0; state.muzzleT = 0; state.shake = 0; state.hitT = 0; state.nukeFlash = 0;
  shieldBubble.visible = false;
  state.rollAnim = { t: 0, dir: 0, active: false };
  state.nukeT = 0;
  input.steer.x = 0; input.steer.y = 0;
  camUp.set(0, 1, 0);
  clearTrails();
  $msg.innerHTML = ''; msgUntil = 0;
  state._camFollow = null;
  // remove old entities
  for (const e of enemies) scene.remove(e.group);
  enemies.length = 0;
  for (const b of bullets) scene.remove(b.mesh);
  bullets.length = 0;
  for (const m of missiles) scene.remove(m.group);
  missiles.length = 0;
  for (const n of nukes) scene.remove(n.group);
  nukes.length = 0;
  for (const p of powers) scene.remove(p.group);
  powers.length = 0;
  for (const x of explosions) scene.remove(x.group);
  explosions.length = 0;
  for (let i = 0; i < 16; i++) {
    const a = Math.random() * Math.PI * 2; const r = 120 + Math.random() * 700;
    spawnEnemy(Math.cos(a) * r, 55 + Math.random() * 80, Math.sin(a) * r, Math.floor(Math.random() * 5));
  }
  for (let i = 0; i < 24; i++) {
    const a = Math.random() * Math.PI * 2; const r = 100 + Math.random() * 800;
    spawnPowerAt(Math.cos(a) * r, 45 + Math.random() * 50, Math.sin(a) * r);
  }
}

// ---------------- Main loop ----------------
let last = performance.now();
const camUp = new THREE.Vector3(0, 1, 0); // smoothed camera up — follows ship through loops
function frame(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  // when paused, skip ALL gameplay updates — only camera + render continue
  if (!state.paused && !state.over) {
    updateShip(dt);
    updateEnemies(dt);
    updateBullets(dt);
    updateMissiles(dt);
    updateNukes(dt);
    updatePowers(dt);
    updateExplosions(dt);
    updateClouds(dt);
    ensureTreesAround(state.pos.x, state.pos.z, 1800);
    ensureMountainsAround(state.pos.x, state.pos.z, 4000);
  }

  // water time
  waterMat.uniforms.time.value = now * 0.001;

  // chase camera — smoothed follow point so the ship can never outrun the view
  ship.updateMatrixWorld();
  const anch = ship.userData.anchor;
  anch.getWorldPosition(tmpVec);
  if (!state._camFollow) state._camFollow = tmpVec.clone();
  state._camFollow.lerp(tmpVec, Math.min(1, dt * 12)); // snappy follow so ship stays in frame
  camera.position.copy(state._camFollow);
  // shake (decays each frame, applied as random offset to camera)
  if (state.shake > 0) {
    state.shake = Math.max(0, state.shake - dt * 3);
    camera.position.x += (Math.random() - 0.5) * state.shake * 0.4;
    camera.position.y += (Math.random() - 0.5) * state.shake * 0.4;
    camera.position.z += (Math.random() - 0.5) * state.shake * 0.4;
  }
  // camera up follows ship up (smoothed) so loops/inverted flight read correctly
  _up.set(0, 1, 0).applyQuaternion(state.quat);
  camUp.lerp(_up, Math.min(1, dt * 3.0)).normalize();
  camera.up.copy(camUp);
  // FOV widens with speed for sensation
  const targetFov = BASE_FOV + Math.min(state.speedMult, 2.2) * 7 + (keys.has('Space') && state.alive ? 4 : 0);
  if (Math.abs(camera.fov - targetFov) > 0.1) {
    camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 4);
    camera.updateProjectionMatrix();
  }
  // look ahead in ship's facing direction
  ship.getWorldDirection(_fwd).negate();
  const lookAhead = tmpVec2.copy(state.pos).add(_fwd.multiplyScalar(50));
  camera.lookAt(lookAhead.x, lookAhead.y + 2, lookAhead.z);

  // sun + sky follow ship (sky dome must surround the camera everywhere in the wrapped world)
  sky.position.copy(state.pos);
  sun.position.set(state.pos.x + 500, state.pos.y + 700, state.pos.z + 300);
  sun.target.position.copy(state.pos);
  sun.target.updateMatrixWorld();
  skyMat.uniforms.sunDir.value.copy(sun.position).sub(state.pos).normalize();
  sunGlow.position.set(state.pos.x + 1500, state.pos.y + 1200, state.pos.z - 800);
  sunMesh.position.copy(sunGlow.position);

  // tree cull: zero-scale trees far from player (toroidal distance for seamless wrap)
  for (let i = 0; i < treeIdx; i++) {
    const t = treeMatrices[i];
    if (!t) continue;
    let dx = t.x - state.pos.x, dz = t.z - state.pos.z;
    if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
    if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
    const far = dx * dx + dz * dz > 2200 * 2200;
    if (far) {
      dummy.position.set(0, -10000, 0); dummy.scale.set(0, 0, 0); dummy.updateMatrix();
      trees.setMatrixAt(i, dummy.matrix);
      trunkMesh.setMatrixAt(i, dummy.matrix);
    }
  }

  // engine hum follows flight (also handles pause/death fade-out)
  audio.engineUpdate(dt, !state.paused && state.alive && !state.over);

  // ---- HUD ----
  $hp.style.width = (state.hp / state.maxHp * 100) + '%';
  $hpTxt.textContent = `HULL ${Math.ceil(state.hp)}`;
  $hullBox.classList.toggle('low', state.hp > 0 && state.hp < 30);
  // damage flash decay (CSS handles fade ease)
  if (state.dmgFlash > 0) state.dmgFlash = Math.max(0, state.dmgFlash - dt * 3);
  $damageFlash.style.opacity = state.dmgFlash.toFixed(3);
  // nuke white-flash decay (slower — the afterimage should linger a beat)
  if (state.nukeFlash > 0) state.nukeFlash = Math.max(0, state.nukeFlash - dt * 1.4);
  $nukeFlash.style.opacity = state.nukeFlash.toFixed(3);
  // hit marker decay
  if (state.hitT > 0) { state.hitT -= dt; if (state.hitT <= 0) $reticle.classList.remove('hit'); }
  // ship blinks during respawn invuln so player can tell when i-frames end
  ship.visible = !(state.invuln > 0.05 && Math.floor(performance.now() * 0.012) % 2 === 0);
  // muzzle flash
  if (state.muzzleT > 0) state.muzzleT -= dt;
  muzzleFlashes.visible = state.muzzleT > 0;
  $weapon.textContent = state.weapon.toUpperCase() + (state.laserTier > 1 ? ` (T${state.laserTier})` : '');
  $ammo.textContent = `LASER ${state.weapon === 'plasma' ? 'PLASMA' : '∞'} | MISSILE ${state.missileAmmo}`;
  $score.textContent = `SCORE ${state.score}`;
  $spd.textContent = Math.round(state.vel.length());
  $alt.textContent = Math.round(state.pos.y);
  $thr.style.width = (state.throttle * 100) + '%';
  // steering cursor
  $stick.style.transform = `translate(${input.steer.x * 110}px, ${-input.steer.y * 110}px)`;
  $stick.style.opacity = (state.paused || state.over) ? '0' : '0.85';

  if (now > msgUntil && !state.paused) $msg.innerHTML = '';
  // persistent PAUSED overlay so user can tell at a glance
  if (state.paused && !state.over && state.alive) {
    $msg.innerHTML = '<span style="font-size:28px;letter-spacing:6px">PAUSED</span><small>press P to resume</small>';
  }

  drawRadar();

  // lock marker on nearest enemy
  let near = null, nd = Infinity;
  for (const e of enemies) {
    const d = e.group.position.distanceTo(state.pos);
    if (d < nd) { nd = d; near = e; }
  }
  if (near && nd < 600) {
    const p = near.group.position.clone();
    p.project(camera);
    $lock.style.display = 'block';
    $lock.style.left = (p.x * 0.5 + 0.5) * innerWidth + 'px';
    $lock.style.top = (-p.y * 0.5 + 0.5) * innerHeight + 'px';
    $lock.style.width = '40px'; $lock.style.height = '40px';
    $lock.style.marginLeft = '-20px'; $lock.style.marginTop = '-20px';
  } else { $lock.style.display = 'none'; }

  renderFrame();
  requestAnimationFrame(frame);
}

let composerOK = !!composer;
function renderFrame() {
  if (composerOK) {
    try { composer.render(); return; }
    catch (e) { composerOK = false; }
  }
  renderer.render(scene, camera);
}

// ---------------- Radar ----------------
function drawRadar() {
  const C = 80, R = 74, RANGE = 900;
  rctx.clearRect(0, 0, 160, 160);
  // dish
  rctx.beginPath(); rctx.arc(C, C, R, 0, Math.PI * 2);
  rctx.fillStyle = 'rgba(4,18,28,.6)'; rctx.fill();
  rctx.strokeStyle = 'rgba(120,220,255,.55)'; rctx.lineWidth = 1.5; rctx.stroke();
  rctx.beginPath(); rctx.arc(C, C, R * 0.5, 0, Math.PI * 2);
  rctx.strokeStyle = 'rgba(120,220,255,.18)'; rctx.lineWidth = 1; rctx.stroke();
  rctx.beginPath();
  rctx.moveTo(C - R, C); rctx.lineTo(C + R, C);
  rctx.moveTo(C, C - R); rctx.lineTo(C, C + R);
  rctx.strokeStyle = 'rgba(120,220,255,.12)'; rctx.stroke();
  // heading from ship forward (horizontal)
  _fwd.set(0, 0, -1).applyQuaternion(state.quat);
  const heading = Math.atan2(_fwd.x, -_fwd.z);
  const blip = (wx, wz, color, maxR) => {
    let dx = wx - state.pos.x, dz = wz - state.pos.z;
    if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
    if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist > maxR) return;
    const clamped = dist > RANGE;
    const a = Math.atan2(dx, -dz) - heading;
    const r = Math.min(dist, RANGE) / RANGE * R;
    const x = C + Math.sin(a) * r, y = C - Math.cos(a) * r;
    rctx.globalAlpha = clamped ? 0.4 : 1;
    rctx.fillStyle = color;
    rctx.beginPath(); rctx.arc(x, y, 2.6, 0, Math.PI * 2); rctx.fill();
    rctx.globalAlpha = 1;
  };
  for (const p of powers) blip(p.group.position.x, p.group.position.z, '#5dff8a', 1400);
  for (const e of enemies) blip(e.group.position.x, e.group.position.z, '#ff5560', 2600);
  // player wedge (nose up = ahead)
  rctx.fillStyle = '#9fe8ff';
  rctx.beginPath();
  rctx.moveTo(C, C - 6); rctx.lineTo(C - 4.5, C + 5); rctx.lineTo(C + 4.5, C + 5);
  rctx.closePath(); rctx.fill();
}

// ---------------- Update ----------------
const _dq = new THREE.Quaternion();
const _axis = new THREE.Vector3();
function updateShip(dt) {
  if (state.paused || state.over) return;

  // ----- throttle (persistent): W up / S down, Shift = airbrake -----
  if (keys.has('KeyW') || keys.has('ArrowUp')) state.throttle = Math.min(1, state.throttle + dt * 0.55);
  if (keys.has('KeyS') || keys.has('ArrowDown')) state.throttle = Math.max(0, state.throttle - dt * 0.55);
  const braking = keys.has('ShiftLeft') || keys.has('ShiftRight');
  if (braking) state.throttle = Math.max(0, state.throttle - dt * 1.8);
  const boosting = keys.has('Space');

  // ----- steering: mouse stick -> pitch/yaw rates (full 360°, no clamps) -----
  // pointer-locked stick is sprung: it eases back to center unless the mouse keeps pushing,
  // so a held turn needs held pressure and one-off deltas can't spin the ship forever
  if (input.locked) {
    const spring = Math.pow(0.08, dt);
    input.steer.x *= spring;
    input.steer.y *= spring;
  }
  const dz = 0.07; // deadzone
  let sx = input.steer.x, sy = input.steer.y;
  if (Math.abs(sx) < dz) sx = 0;
  if (Math.abs(sy) < dz) sy = 0;
  const rolling = state.rollAnim && state.rollAnim.active;
  if (!rolling) {
    if (sy) { _axis.set(1, 0, 0); state.quat.multiply(_dq.setFromAxisAngle(_axis, sy * PITCH_RATE * state.invertY * dt)); }
    if (sx) { _axis.set(0, 1, 0); state.quat.multiply(_dq.setFromAxisAngle(_axis, -sx * YAW_RATE * dt)); }
  }

  // ----- A/D aileron roll -----
  let manualRoll = 0;
  if (!rolling) {
    if (keys.has('KeyA') || keys.has('ArrowLeft')) manualRoll += 1;
    if (keys.has('KeyD') || keys.has('ArrowRight')) manualRoll -= 1;
    if (manualRoll) { _axis.set(0, 0, 1); state.quat.multiply(_dq.setFromAxisAngle(_axis, manualRoll * ROLL_RATE * dt)); }
  }

  // ----- barrel roll animation (real rotation around local Z, eased) -----
  if (rolling) {
    const ra = state.rollAnim;
    const prevT = ra.t;
    ra.t = Math.min(0.6, ra.t + dt);
    const ease = t => 1 - Math.pow(1 - Math.min(1, t / 0.6), 2);
    const dAngle = (ease(ra.t) - ease(prevT)) * Math.PI * 2 * ra.dir;
    _axis.set(0, 0, 1); state.quat.multiply(_dq.setFromAxisAngle(_axis, dAngle));
    if (ra.t >= 0.6) ra.active = false;
  }

  // ----- coordinated flight: bank into stick turns, auto-level otherwise -----
  if (!manualRoll && !rolling) {
    _right.set(1, 0, 0).applyQuaternion(state.quat);
    const bankAngle = Math.asin(Math.max(-1, Math.min(1, _right.y))); // >0 = banked left
    const bankTarget = -sx * 0.85; // banking right (negative) while steering right
    const corr = (bankTarget - bankAngle) * Math.min(1, dt * 2.5);
    const maxCorr = 2.0 * dt;
    _axis.set(0, 0, 1);
    state.quat.multiply(_dq.setFromAxisAngle(_axis, Math.max(-maxCorr, Math.min(maxCorr, corr))));
  }
  state.quat.normalize();

  // ----- velocity chases nose * throttle (slight drift, always flies where pointed) -----
  _fwd.set(0, 0, -1).applyQuaternion(state.quat);
  const targetSpeed = state.throttle * CRUISE * (boosting ? BOOST_MULT : 1);
  tmpVec.copy(_fwd).multiplyScalar(targetSpeed);
  state.vel.lerp(tmpVec, Math.min(1, dt * (braking ? 5 : 2.4)));
  if (braking) state.vel.multiplyScalar(Math.pow(0.4, dt));

  state.pos.x += state.vel.x * dt;
  state.pos.y += state.vel.y * dt;
  state.pos.z += state.vel.z * dt;
  state.speedMult = state.vel.length() / CRUISE;
  // toroidal wrap (seamless world — no edges)
  wrapPos(state.pos);
  const ground = heightAt(state.pos.x, state.pos.z);
  const minY = Math.max(ground + 4, water.position.y + 4);
  if (state.pos.y < minY) {
    const impact = Math.abs(state.vel.y);
    state.pos.y = minY;
    if (state.vel.y < 0) state.vel.y = 0;
    damagePlayer(Math.min(25, 0.5 * impact));
  }
  if (state.pos.y > CEILING) { state.pos.y = CEILING; state.vel.y = Math.min(0, state.vel.y); }

  ship.quaternion.copy(state.quat);
  ship.position.copy(state.pos);
  ship.position.y += Math.sin(performance.now() * 0.003) * 0.15;
  ship.updateMatrixWorld();

  // engine flames + glow follow throttle/boost
  const power = state.throttle + (boosting ? 0.6 : 0);
  for (const k of ['flameL', 'flameR']) {
    const fl = ship.userData[k]; if (!fl) continue;
    fl.scale.set(1, 1, 0.4 + power * 0.9 + Math.sin(performance.now() * 0.03) * 0.18);
  }
  for (const k of ['glowL', 'glowR']) {
    const gl = ship.userData[k]; if (!gl) continue;
    const s = 1.4 + power * 1.8 + Math.sin(performance.now() * 0.025) * 0.25;
    gl.scale.set(s, s, 1);
    gl.material.opacity = 0.25 + power * 0.5;
  }

  // contrails from engine tips — strength follows speed
  const trailStrength = Math.max(0, Math.min(1, (state.vel.length() - 60) / 200));
  ship.localToWorld(tmpVec.set(-2.9, 0, 7.7));
  updateTrail(trailL, tmpVec, dt, trailStrength);
  ship.localToWorld(tmpVec.set(2.9, 0, 7.7));
  updateTrail(trailR, tmpVec, dt, trailStrength);

  if (state.fireT > 0) state.fireT -= dt;
  if (state.missileT > 0) state.missileT -= dt;
  if (state.nukeT > 0) state.nukeT -= dt;
  if (state.rapidT > 0) { state.rapidT -= dt; if (state.rapidT <= 0) downgradeWeapon(); }
  if (state.doubleT > 0) { state.doubleT -= dt; if (state.doubleT <= 0) downgradeWeapon(); }
  if (state.plasmaT > 0) { state.plasmaT -= dt; if (state.plasmaT <= 0) downgradeWeapon(); }
  if (state.invuln > 0) state.invuln -= dt;
  if (state.shieldT > 0) {
    state.shieldT -= dt;
    shieldBubble.visible = true;
    shieldBubble.material.opacity = 0.14 + Math.sin(performance.now() * 0.012) * 0.06;
  } else { shieldBubble.visible = false; }

  if (mouse.downL && state.fireT <= 0) shoot('laser');
}

function downgradeWeapon() {
  if (state.laserTier === 1) { state.weapon = 'laser'; state.fireRate = 0.22; }
  else if (state.laserTier === 2) { state.weapon = 'rapid'; state.fireRate = 0.12; }
  else if (state.laserTier === 3) { state.weapon = 'double'; state.fireRate = 0.1; }
  else if (state.laserTier >= 4) { state.weapon = 'plasma'; state.fireRate = 0.18; }
}

function updateEnemies(dt) {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.bob += dt;
    // move toward player — toroidal delta so enemies on the other side of the wrap still close in
    let dx = state.pos.x - e.group.position.x, dz = state.pos.z - e.group.position.z;
    if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
    if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
    const distXZ = Math.sqrt(dx * dx + dz * dz);
    if (distXZ > 1) {
      e.group.position.x += (dx / distXZ) * e.speed * dt;
      e.group.position.z += (dz / distXZ) * e.speed * dt;
    }
    // altitude: hover around player y with bob
    const targetY = state.pos.y + Math.sin(e.bob * 1.2 + i) * 6;
    e.group.position.y += (targetY - e.group.position.y) * Math.min(1, dt * 0.6);
    e.group.rotation.y += dt * 0.5;
    e.group.rotation.z = Math.sin(e.bob) * 0.15;
    // shoot
    e.shootT -= dt;
    if (e.shootT <= 0 && distXZ < 700 && Math.abs(e.group.position.y - state.pos.y) < 80) {
      e.shootT = e.fireRate;
      // aim at player with some inaccuracy
      const dir = new THREE.Vector3(state.pos.x - e.group.position.x, state.pos.y - e.group.position.y, state.pos.z - e.group.position.z).normalize();
      dir.x += (Math.random() - 0.5) * 0.06; dir.y += (Math.random() - 0.5) * 0.06; dir.z += (Math.random() - 0.5) * 0.06;
      dir.normalize();
      const m = new THREE.Mesh(enemyBulletGeo, enemyBulletMat);
      m.position.copy(e.group.position);
      bullets.push({ mesh: m, vx: dir.x * 220, vy: dir.y * 220, vz: dir.z * 220, friendly: false, life: 3 });
      scene.add(m);
    }
    // collision with player (ramming) — toroidal distance so enemies on either side of the wrap register
    let rdx = state.pos.x - e.group.position.x, rdz = state.pos.z - e.group.position.z;
    if (rdx > WORLD_R) rdx -= WORLD_R * 2; else if (rdx < -WORLD_R) rdx += WORLD_R * 2;
    if (rdz > WORLD_R) rdz -= WORLD_R * 2; else if (rdz < -WORLD_R) rdz += WORLD_R * 2;
    const rdy = state.pos.y - e.group.position.y;
    const d = Math.sqrt(rdx * rdx + rdy * rdy + rdz * rdz);
    if (d < 9 && state.invuln <= 0) {
      damagePlayer(7.5); // ramming deals half damage
      e.hp = 0;
    }
    if (e.hp <= 0) {
      spawnExplosion(e.group.position, 1);
      state.score += e.score;
      // milestone announcements every 1000 points
      const prevMilestone = Math.floor(state.score / 1000);
      const milestone = Math.floor((state.score - e.score) / 1000);
      if (prevMilestone > milestone && milestone > 0) setMsg(`RANK ${milestone * 1000}`);
      scene.remove(e.group);
      enemies.splice(i, 1);
      // chance to drop a power-up
      if (Math.random() < 0.18) spawnPowerAt(e.group.position.x, e.group.position.y, e.group.position.z);
    }
    // toroidal wrap keeps world populated across boundaries (no despawn)
    wrapPos(e.group.position);
  }
  // respawn over time to keep world populated
  if (enemies.length < 12 && !state.over) {
    const a = Math.random() * Math.PI * 2; const r = 1200 + Math.random() * 800;
    spawnEnemy(state.pos.x + Math.cos(a) * r, state.pos.y + (Math.random() - 0.5) * 40, state.pos.z + Math.sin(a) * r, Math.floor(Math.random() * 5));
  }
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.mesh.position.x += b.vx * dt;
    b.mesh.position.y += b.vy * dt;
    b.mesh.position.z += b.vz * dt;
    wrapPos(b.mesh.position);
    b.life -= dt;
    if (b.life <= 0) { scene.remove(b.mesh); bullets.splice(i, 1); continue; }
    // ground
    if (b.mesh.position.y < heightAt(b.mesh.position.x, b.mesh.position.z) + 1) {
      // hit ground -> small puff
      spawnExplosion(b.mesh.position.clone().setY(heightAt(b.mesh.position.x, b.mesh.position.z) + 1), 0.3);
      scene.remove(b.mesh); bullets.splice(i, 1); continue;
    }
    if (b.friendly) {
      // hit enemy — arcade-sized hit-box, toroidal-aware
      for (const e of enemies) {
        let dx = e.group.position.x - b.mesh.position.x, dz = e.group.position.z - b.mesh.position.z;
        if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
        if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
        if (dx * dx + dz * dz < 64) {
          e.hp -= (b.plasma ? 8 : 4);
          markHit();
          spawnExplosion(b.mesh.position, 0.4);
          scene.remove(b.mesh); bullets.splice(i, 1); break;
        }
      }
    } else {
      // hit player — toroidal-aware
      let dx = state.pos.x - b.mesh.position.x, dz = state.pos.z - b.mesh.position.z;
      if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
      if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
      if (dx * dx + dz * dz < 36) {
        damagePlayer(4); // enemy bullets deal half damage
        spawnExplosion(b.mesh.position, 0.4);
        scene.remove(b.mesh); bullets.splice(i, 1);
      }
    }
    // bullets wrap, no hard out-of-range kill
  }
}

function updateMissiles(dt) {
  for (let i = missiles.length - 1; i >= 0; i--) {
    const m = missiles[i];
    m.life -= dt;
    if (m.life <= 0) { spawnExplosion(m.group.position, 0.6); scene.remove(m.group); missiles.splice(i, 1); continue; }
    // homing
    if (m.target && m.target.parent) {
      tmpVec.copy(m.target.position).sub(m.group.position);
      if (tmpVec.lengthSq() > 1) {
        tmpVec.normalize();
        const turn = 0.06;
        m.vx += (tmpVec.x * 240 - m.vx) * turn;
        m.vy += (tmpVec.y * 240 - m.vy) * turn;
        m.vz += (tmpVec.z * 240 - m.vz) * turn;
      }
    }
    m.group.position.x += m.vx * dt;
    m.group.position.y += m.vy * dt;
    m.group.position.z += m.vz * dt;
    // missiles wrap
    wrapPos(m.group.position);
    m.group.lookAt(m.group.position.x - m.vx, m.group.position.y - m.vy, m.group.position.z - m.vz);
    m.flame.scale.z = 0.7 + Math.sin(performance.now() * 0.04) * 0.3;
    // hit — toroidal-aware
    let hit = false;
    for (const e of enemies) {
      let dx = e.group.position.x - m.group.position.x, dz = e.group.position.z - m.group.position.z;
      if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
      if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
      if (dx * dx + dz * dz < 100) {
        e.hp -= 22;
        markHit();
        spawnExplosion(m.group.position, 0.8);
        hit = true; break;
      }
    }
    if (!hit) {
      let dx = state.pos.x - m.group.position.x, dz = state.pos.z - m.group.position.z;
      if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
      if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
      if (dx * dx + dz * dz < 49) { damagePlayer(20); spawnExplosion(m.group.position, 0.8); hit = true; }
    }
    // ground impact
    if (!hit && m.group.position.y < heightAt(m.group.position.x, m.group.position.z) + 2) {
      spawnExplosion(m.group.position.clone().setY(heightAt(m.group.position.x, m.group.position.z) + 2), 0.6);
      hit = true;
    }
    if (hit) { scene.remove(m.group); missiles.splice(i, 1); }
  }
}

// nuke ticks forward, proximity-detonates when an enemy is inside the fuse radius
function updateNukes(dt) {
  const PROX_FUSE = 45 * 45;      // detonate when enemy within 45u (distance squared)
  const BLAST_R = 180;            // lethal to every enemy within 180u — it's a nuke
  const BLAST_RADIUS = BLAST_R * BLAST_R;
  for (let i = nukes.length - 1; i >= 0; i--) {
    const n = nukes[i];
    n.life -= dt;
    n.group.position.x += n.vx * dt;
    n.group.position.y += n.vy * dt;
    n.group.position.z += n.vz * dt;
    wrapPos(n.group.position);
    n.group.lookAt(n.group.position.x - n.vx, n.group.position.y - n.vy, n.group.position.z - n.vz);
    if (n.flame) n.flame.scale.z = 0.7 + Math.sin(performance.now() * 0.04) * 0.3;

    // proximity fuse — any enemy within 32u → detonate
    let detonate = false;
    for (const e of enemies) {
      let dx = e.group.position.x - n.group.position.x, dz = e.group.position.z - n.group.position.z;
      if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
      if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
      const dy = e.group.position.y - n.group.position.y;
      if (dx * dx + dy * dy + dz * dz < PROX_FUSE) { detonate = true; break; }
    }
    // ground impact
    if (!detonate && n.group.position.y < heightAt(n.group.position.x, n.group.position.z) + 2) detonate = true;
    // lifetime expiry
    if (n.life <= 0) detonate = true;

    if (detonate) {
      // massive lingering blast — fireball + smoke cap + shock ring + light flash
      spawnExplosion(n.group.position, 3, { life: 1.8, debris: 18, debrisSpd: 14, fbGrow: 60, ringGrow: 110, smoke: true, light: true });
      // screen flash + shake scale with how close the blast is to the player
      let fx = state.pos.x - n.group.position.x, fz = state.pos.z - n.group.position.z;
      if (fx > WORLD_R) fx -= WORLD_R * 2; else if (fx < -WORLD_R) fx += WORLD_R * 2;
      if (fz > WORLD_R) fz -= WORLD_R * 2; else if (fz < -WORLD_R) fz += WORLD_R * 2;
      const fy = state.pos.y - n.group.position.y;
      const playerDist = Math.sqrt(fx * fx + fy * fy + fz * fz);
      state.nukeFlash = Math.max(state.nukeFlash, Math.min(1, Math.max(0.35, 1.2 - playerDist / 900)));
      state.shake = Math.min(2.5, (state.shake || 0) + Math.min(1.4, Math.max(0.35, 1.4 - playerDist / 700)));
      // AoE kill — every enemy within BLAST_RADIUS dies (processed by updateEnemies:
      // secondary explosions, score credit, possible power-up drops)
      for (const e of enemies) {
        let dx = e.group.position.x - n.group.position.x, dz = e.group.position.z - n.group.position.z;
        if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
        if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
        const dy = e.group.position.y - n.group.position.y;
        const d2 = dx * dx + dy * dy + dz * dz;
        if (d2 < BLAST_RADIUS) e.hp = 0;
      }
      // own nukes never hurt the player — the flash/shake above are warning enough

      scene.remove(n.group);
      nukes.splice(i, 1);
    }
  }
}

function updatePowers(dt) {
  for (let i = powers.length - 1; i >= 0; i--) {
    const p = powers[i];
    p.life -= dt;
    p.group.rotation.y += dt * 1.4;
    p.group.position.y += Math.sin(performance.now() * 0.003 + i) * 0.02;
    // pulse the glow so pickups catch the eye
    if (p.group.userData.glow) {
      const pulse = 18 + Math.sin(performance.now() * 0.004 + i * 1.7) * 5;
      p.group.userData.glow.scale.set(pulse, pulse, 1);
    }
    // pickup — toroidal-aware; radius matches the 5x gem so flying through it collects
    let dx = state.pos.x - p.group.position.x, dz = state.pos.z - p.group.position.z;
    if (dx > WORLD_R) dx -= WORLD_R * 2; else if (dx < -WORLD_R) dx += WORLD_R * 2;
    if (dz > WORLD_R) dz -= WORLD_R * 2; else if (dz < -WORLD_R) dz += WORLD_R * 2;
    if (dx * dx + dz * dz < 144) {
      applyPowerUp(p.kind);
      scene.remove(p.group); powers.splice(i, 1); continue;
    }
    if (p.life <= 0) { scene.remove(p.group); powers.splice(i, 1); continue; }
  }
  // keep power-ups populated — spawn near the player and near the player's altitude,
  // above terrain, so they're actually reachable and on-screen
  if (powers.length < 16 && !state.over) {
    const a = Math.random() * Math.PI * 2; const r = 250 + Math.random() * 400;
    const x = state.pos.x + Math.cos(a) * r, z = state.pos.z + Math.sin(a) * r;
    const y = Math.max(heightAt(x, z) + 14, state.pos.y + (Math.random() - 0.5) * 50);
    spawnPowerAt(x, y, z);
  }
}

function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const ex = explosions[i];
    ex.life -= dt;
    const t = 1 - Math.max(0, ex.life / ex.maxLife); // 0 -> 1 over lifetime
    for (const p of ex.group.children) {
      if (p === ex.fireball || p === ex.ring || p === ex.smoke || p === ex.light) continue;
      p.position.add(p.userData.vel.clone().multiplyScalar(dt));
      p.userData.vel.multiplyScalar(0.95);
      p.material.opacity = Math.max(0, ex.life / ex.maxLife);
    }
    // fireball grows and fades; ring expands faster and fades sooner
    const fb = (2 + t * ex.fbGrow) * ex.scale;
    ex.fireball.scale.set(fb, fb, 1);
    ex.fireball.material.opacity = Math.max(0, 0.95 - t * 0.9);
    if (ex.smoke) {
      // smoke cap billows slower and drifts upward
      const sm = (4 + t * ex.fbGrow * 0.9) * ex.scale;
      ex.smoke.scale.set(sm, sm, 1);
      ex.smoke.position.y = t * 14 * ex.scale;
      ex.smoke.material.opacity = Math.max(0, 0.65 - t * 0.65);
    }
    const rg = (1 + t * ex.ringGrow) * ex.scale;
    ex.ring.scale.set(rg, rg, 1);
    ex.ring.material.opacity = Math.max(0, 0.7 - t * 1.4);
    ex.ring.lookAt(camera.position);
    if (ex.light) ex.light.intensity = 6 * Math.max(0, 1 - t * 2.5);
    if (ex.life <= 0) { scene.remove(ex.group); explosions.splice(i, 1); }
  }
}

// first call
requestAnimationFrame(frame);

// expose for testing
window.__GAME__ = { state, input, audio, enemies, bullets, missiles, nukes, powers, explosions, ship, scene, camera, renderer, restart, applyPowerUp, heightAt, WORLD_R, THREE };
</script>
